# Sidecar stack for k6 load runs. Brings up Prometheus configured for
# k6's remote-write protocol and Grafana with the dashboards in
# ./k6/dashboards/ pre-provisioned.
#
# Network: uses host networking so k6 (or `make loadtest-run` on the
# host) can reach ledger-svc on localhost:9090 from the same box, and
# Prometheus can scrape host-level exporters if you add any.
#
# Boot order: make stack-up first (the ledger-svc + PG + Redis + Redpanda
# infra), then `docker compose -f apps/ledger-svc/load/docker-compose.yml up -d`.
# Keeping the load infra in its own compose file means tearing it down
# (e.g. between runs) doesn't blow away the database.

services:
  prom-load:
    image: prom/prometheus:v2.55.1
    container_name: prom-load
    network_mode: host
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h
      - --web.enable-remote-write-receiver
      - --web.listen-address=:9091
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-load-data:/prometheus

  grafana-load:
    image: grafana/grafana:11.3.0
    container_name: grafana-load
    network_mode: host
    environment:
      - GF_SERVER_HTTP_PORT=3001
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=load
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
      - ./k6/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-load-data:/var/lib/grafana
    depends_on:
      - prom-load

volumes:
  prom-load-data:
  grafana-load-data:
