# Postgres 18 — load-test profile, sized for sustained 10K+ TPS write
# workload on a 32GB local dev host. Mounted instead of postgresql.conf
# via the docker-compose.load.yml overlay.
#
# Keep this in sync with internal/config DBConfig defaults (issue 2):
# the application's MaxConns ceiling must fit under max_connections here
# with headroom for replicas + outbox workers + reconciler.

listen_addresses = '*'

# Memory.
# shared_buffers is pre-allocated at startup (POSIX shm) — paid up front.
# 4GB sized for the hot working set of journal_entries + transactions
# + their indexes during a 30-min ramp; effective_cache_size is a
# planner hint that PG can rely on the OS page cache for everything else.
shared_buffers       = 4GB
effective_cache_size = 12GB
work_mem             = 32MB
maintenance_work_mem = 512MB
max_connections      = 700

# Storage cost models for NVMe. random_page_cost down to 1.1 stops the
# planner from preferring sequential scans over index scans at small
# table sizes; effective_io_concurrency=200 lets the AIO subsystem
# saturate device queue depth on NVMe.
random_page_cost         = 1.1
effective_io_concurrency = 256

# PG 18 AIO — 8 workers gives us parallel readahead on hot indexes
# under contended writes without burning CPU on idle waits.
io_method         = worker
io_workers        = 8
io_combine_limit  = 128

# WAL. 8GB max means checkpoints fire on time, not on size, which keeps
# checkpoint write storms off the critical path. completion_target=0.9
# spreads the dirty-buffer flush across 90% of the checkpoint interval
# instead of bursting it at the end.
wal_buffers                  = 64MB
max_wal_size                 = 8GB
min_wal_size                 = 2GB
checkpoint_timeout           = 15min
checkpoint_completion_target = 0.9

# Background writer — keep dirty buffer pressure off the foreground
# write path under sustained load.
bgwriter_delay      = 100ms
bgwriter_lru_maxpages = 1000

# Autovacuum. Defaults are designed for occasional-write workloads;
# at 10K writes/sec the dead-tuple accumulation outpaces them and the
# tables bloat. Tighter scale factors + shorter naptime keep up.
# autovacuum_max_workers default of 3 is fine; bumping just adds CPU
# contention on the same I/O bottleneck.
autovacuum                          = on
autovacuum_naptime                  = 10s
autovacuum_vacuum_scale_factor      = 0.05
autovacuum_analyze_scale_factor     = 0.05
autovacuum_vacuum_cost_limit        = 2000
autovacuum_vacuum_cost_delay        = 2ms

# Per-table override knobs are richer (autovacuum_vacuum_scale_factor
# can be set on outbox_events specifically since it churns hot) — set
# those via ALTER TABLE in a follow-up migration if/when the global
# tuning isn't tight enough.

# Observability — pg_stat_statements is mandatory for figuring out
# which queries are eating the budget. track_io_timing makes
# pg_stat_statements report I/O time distinct from CPU time.
shared_preload_libraries = 'pg_stat_statements'
track_io_timing          = on
track_activities         = on
track_counts             = on

pg_stat_statements.max  = 5000
pg_stat_statements.track = top

# JIT off for OLTP write workloads. JIT compile overhead doesn't pay
# back on the short, parameterized queries the hot path generates.
jit = off

# Durability: synchronous_commit=on (default). Don't switch to off for
# load tests you'll quote — that's measuring without WAL fsync, which
# isn't the engine you'd actually ship. Switch to off only when
# specifically isolating "what's the single-PG write ceiling absent
# fsync" as a separate experiment.
synchronous_commit = on

# Logging. log_min_duration_statement at 100ms surfaces queries we
# care about during the load run without flooding logs at request
# rate. log_lock_waits catches SERIALIZABLE conflicts in the wild.
log_min_duration_statement = 100
log_lock_waits             = on
log_temp_files             = 10MB
log_checkpoints            = on
log_autovacuum_min_duration = 0
