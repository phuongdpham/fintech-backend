# DB Version: 18
# Dev profile — minimal memory footprint for a 32GB local dev host.
#
# Numbers below are tuned for "service running but mostly idle."
# For realistic stress testing of the 5K TPS production target, swap to:
#
#   shared_buffers      = 4GB
#   effective_cache_size = 12GB
#   work_mem            = 64MB
#   max_connections     = 300
#   max_wal_size        = 4GB
#   min_wal_size        = 1GB
#   io_workers          = 8
#
# Keeping both profiles in one file via comments rather than splitting:
# editing five lines is faster than maintaining two configs that drift.

# Required when this file is mounted into the postgres container — without
# it PG defaults to listen_addresses='localhost' and the container's
# external port mapping has nothing to forward to.
listen_addresses = '*'

# Memory: shared_buffers is pre-allocated at startup (POSIX shm), so any
# value here is paid up-front regardless of load. effective_cache_size is
# only a planner hint — costs nothing.
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 16MB
max_connections = 100
random_page_cost = 1.1

# PostgreSQL 18 AIO. Worker count dropped from 8 to 2 — anything above 2
# is wasted at dev concurrency.
io_method = worker
io_workers = 2
io_combine_limit = 128

# WAL: PG defaults are fine for dev. Sized down from prod's 4GB/1GB.
max_wal_size = 1GB
min_wal_size = 80MB
