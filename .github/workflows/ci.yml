name: CI-Quality-Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          # Workspace uses go.work — each module has its own go.sum.
          # Glob the lot so the toolchain cache key reflects every
          # module's deps, not a phantom root go.sum.
          cache-dependency-path: '**/go.sum'

      # pnpm BEFORE setup-node: setup-node auto-detects pnpm-lock.yaml
      # and enables pnpm caching, which fails if pnpm isn't on PATH yet.
      # action-setup picks the version from package.json's packageManager.
      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      # Install buf from its release directly. Avoids depending on
      # bufbuild/buf-setup-action (still Node-20 JS) and pins the version
      # so CI proto generation is reproducible. Bump BUF_VERSION
      # deliberately when adopting new buf features.
      - name: Setup Buf
        env:
          BUF_VERSION: '1.68.4'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/buf" \
            "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64"
          chmod +x "$HOME/.local/bin/buf"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/buf" --version

      - name: Install Dependencies
        run: pnpm install

      - name: Proto Lint & Generate
        run: |
          cd shared/proto
          buf lint
          buf generate

      # Push to main: run everything (validate the merge target).
      # PR: run only what's affected vs. base for fast feedback.
      - name: Build & Test
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pnpm exec nx affected --target=test --base=origin/main
            pnpm exec nx affected --target=build --base=origin/main
          else
            pnpm exec nx run-many --target=test
            pnpm exec nx run-many --target=build
          fi

      # govulncheck doesn't follow go.work — it needs a go.mod in the
      # working directory. Loop over every module the workspace includes.
      - name: Security Audit
        env:
          CGO_ENABLED: '1'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          for d in $(find apps libs -name go.mod -exec dirname {} \;); do
            echo "::group::govulncheck $d"
            (cd "$d" && govulncheck ./...)
            echo "::endgroup::"
          done
